name: qml-ccs
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.10
  
  # Core scientific computing
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scipy>=1.7.0
  
  # Machine Learning
  - scikit-learn=1.5.1
  
  # Visualization
  - matplotlib>=3.5.0
  - seaborn>=0.11.0
  
  # Utilities
  - joblib>=1.1.0
  - tqdm>=4.62.0
  
  # Jupyter
  - jupyter
  - ipykernel
  - ipywidgets
  
  # Pip packages (quantum frameworks)
  - pip
  - pip:
    - qiskit>=0.45.0
    - qiskit-machine-learning==0.7.2
    - qiskit-aer>=0.13.0
    - pennylane==0.38.0
    - pennylane-lightning>=0.30.0
